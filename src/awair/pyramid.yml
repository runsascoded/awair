# pyrmts pyramid config for the awair time-series.
# Read by both the Python builder (src/awair/pyramid/) and the CFW serving
# worker (cfw/serve/). See pyrmts/SPEC.md §YAML schema for the grammar.
#
# Tier density: SUF ~3-4× between adjacent tiers (down from 5-8× in the
# original ladder — see the health page + `/q?debug=1` traces prior to
# commit 966dd02 for the empirical case). Constrained to 1mo + 1y shards
# because the Python builder's `shards_overlapping` only enumerates those
# two + 1d today. Drops d7/mo1 — multi-year views at bin_budget=1024 land
# on d1 with more bins; add them back if we ever need coarser aggregates.

storage:
  type: r2
  binding: PYRAMID
  bucket: awair
  key: 'pyramid/awair-{device_id}/{tier}/{period}.parquet'

dims:
  - { name: device_id, type: int }

metrics:
  - { name: temp,  monoid: sum }
  - { name: co2,   monoid: sum }
  - { name: pm10,  monoid: sum }
  - { name: pm25,  monoid: sum }
  - { name: humid, monoid: sum }
  - { name: voc,   monoid: sum }

tiers:
  - { name: raw, bin: 1min,  shard: 1mo }   # base — Lambda piggyback writes per-minute
  - { name: m3,  bin: 3min,  shard: 1mo }   # 3×
  - { name: m10, bin: 10min, shard: 1mo }   # 3.3×
  - { name: m30, bin: 30min, shard: 1mo }   # 3×
  - { name: h2,  bin: 2h,    shard: 1y  }   # 4×
  - { name: h6,  bin: 6h,    shard: 1y  }   # 3×
  - { name: d1,  bin: 1d,    shard: 1y  }   # 4×
