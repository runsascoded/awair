# pyrmts pyramid config for the awair time-series.
# Read by both the Python builder (src/awair/pyramid/) and the CFW serving
# worker (cfw/serve/) + cascade (cfw/cascade/). See pyrmts/SPEC.md.
#
# Multi-rung `shards: [...]` ladders (unified shard-duration ladder), per
# ctbk's `configs/pyramids/avail.yaml` pattern. Each rung ≤ 4× the
# previous; divisibility-chained so pyrmts' gap-discovery can tile the
# current partial period with progressively smaller rungs and consolidate
# to the max-rung once it closes. Cascade fills the smaller rungs itself;
# the Python `awair pyramid backfill` CLI writes ONLY the max-rung per
# tier (cascade covers the rest self-sufficiently).
#
# SUF (bin ratio between adjacent bin-divisible tiers) is 3-4×. Some tier
# pairs don't chain (10 % 3 ≠ 0) — `previous_tier` uses bin-divisibility
# to pick a valid source (skipping non-dividing intermediates) rather
# than blindly walking prev-in-list, which would silently smear
# aggregates. Matches ctbk `sourceTierFor`.

storage:
  type: r2
  binding: PYRAMID
  bucket: awair
  key: 'pyramid/awair-{device_id}/{tier}/{period}.parquet'

dims:
  - { name: device_id, type: int }

metrics:
  - { name: temp,  monoid: sum }
  - { name: co2,   monoid: sum }
  - { name: pm10,  monoid: sum }
  - { name: pm25,  monoid: sum }
  - { name: humid, monoid: sum }
  - { name: voc,   monoid: sum }

tiers:
  # Lambda-owned. Cascade never writes raw; keeps key template `2026-07`
  # (1mo) so it matches Lambda's monthly parquet naming.
  - { name: raw, bin: 1min,  shards: [1mo] }
  # Cascade fills 1d rungs for the current partial 32d period, then
  # consolidates to 4d, then 32d as boundaries close.
  - { name: m3,  bin: 3min,  shards: [1d, 4d, 32d] }
  # 10 % 3 ≠ 0 → source is raw, not m3 (silent-smear avoidance).
  - { name: m10, bin: 10min, shards: [1d, 4d, 32d] }
  - { name: m30, bin: 30min, shards: [4d, 32d, 128d] }
  - { name: h2,  bin: 2h,    shards: [16d, 128d, 512d] }
  - { name: h6,  bin: 6h,    shards: [16d, 128d, 512d] }
  - { name: d1,  bin: 1d,    shards: [32d, 128d, 512d] }
